<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#0D0C0A" rx="10"/>

  <!-- Subtle grid -->
  <line x1="0"  y1="32" x2="64" y2="32" stroke="rgba(240,235,225,0.04)" stroke-width="0.5"/>
  <line x1="32" y1="0"  x2="32" y2="64" stroke="rgba(240,235,225,0.04)" stroke-width="0.5"/>

  <!-- Gold corner brackets -->
  <polyline points="5,13 5,5 13,5"    fill="none" stroke="#B8A882" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="51,5 59,5 59,13"  fill="none" stroke="#B8A882" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="5,51 5,59 13,59"  fill="none" stroke="#B8A882" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="59,51 59,59 51,59" fill="none" stroke="#B8A882" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Alpha symbol -->
  <text x="32" y="43"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="33"
    font-weight="700"
    fill="#F0EBE1">α</text>

  <!-- Gold dot accent -->
  <circle cx="50" cy="52" r="2" fill="#B8A882" opacity="0.7"/>
</svg>
